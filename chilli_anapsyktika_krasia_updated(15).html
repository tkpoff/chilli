<html>
<head>

        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: white;
        }
        header {
            background: #35424a;
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
        }
        .logo {
            display: inline-block;
            margin-bottom: 10px;
        }
        .item {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            border-radius: 5px;
        }
        .item-name {
            font-size: 13px;
            font-weight: bold;
        }
        .price {
            font-size: 14px;
            color: green;
        }
        .item-sub {
            font-size: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="logo.png" alt="Logo" class="logo" />

        </header>
        <div class="item">
            <div class="item-name">Example Item 1</div>
            <div class="price">$20.00</div>
            <div class="item-sub">Description for Example Item 1</div>
        </div>
        <div class="item">
            <div class="item-name">Example Item 2</div>
            <div class="price">$25.00</div>
            <div class="item-sub">Description for Example Item 2</div>
        </div>
        <!-- Additional items would go here -->
    </div>

</html>
